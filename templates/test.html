<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест - SmartStudy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="bg-white shadow-sm border-b border-slate-200 py-4 px-6 flex justify-between items-center mb-8">
        <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2 cursor-pointer" onclick="window.location.href='/'">
            <span>🎓</span> SmartStudy
        </h1>
        <button onclick="window.history.back()" class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition">
            ← Назад до результатів
        </button>
    </header>

    <main class="max-w-3xl mx-auto px-4 pb-12">
        <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">Перевір свої знання ✍️</h2>
        
        <div class="space-y-6">
            {% for item in test %}
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm question-block">
                <h3 class="font-semibold text-lg text-slate-800 mb-4">{{ loop.index }}. {{ item.question }}</h3>
                <div class="space-y-2">
                    {% for option in item.options %}
                    <button 
                        data-option="{{ option }}"
                        data-correct="{{ item.answer }}"
                        onclick="checkAnswer(this)"
                        class="w-full text-left p-3 rounded-lg border border-slate-200 hover:bg-indigo-50 hover:border-indigo-300 transition duration-150 option-btn text-slate-700">
                        {{ option }}
                    </button>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <script>
        function checkAnswer(btn) {
            const parentBlock = btn.closest('.question-block');
            const allBtns = parentBlock.querySelectorAll('.option-btn');
            
            // Блокуємо всі кнопки після вибору
            allBtns.forEach(b => {
                b.disabled = true;
                b.classList.remove('hover:bg-indigo-50', 'hover:border-indigo-300');
            });

            // Тепер ми безпечно дістаємо текст прямо з самої кнопки, і JS не ламається
            const cleanSelected = btn.getAttribute('data-option').trim();
            const cleanCorrect = btn.getAttribute('data-correct').trim();

            if (cleanSelected === cleanCorrect) {
                btn.classList.add('bg-emerald-100', 'border-emerald-500', 'text-emerald-800', 'font-medium');
                btn.innerText = "✅ " + cleanSelected;
            } else {
                btn.classList.add('bg-red-100', 'border-red-500', 'text-red-800');
                btn.innerText = "❌ " + cleanSelected;
                
                // Показуємо правильну відповідь
                allBtns.forEach(b => {
                    const btnOption = b.getAttribute('data-option').trim();
                    if (btnOption === cleanCorrect) {
                        b.classList.add('bg-emerald-50', 'border-emerald-400', 'text-emerald-700');
                    }
                });
            }
        }
    </script>
</body>
</html>
