<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конспект - SmartStudy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Стилі для HTML, який згенерує нейромережа */
        .conspect-content h2 { font-size: 1.5rem; font-weight: 700; color: #4f46e5; margin-top: 1.5rem; margin-bottom: 0.75rem; border-bottom: 2px solid #e0e7ff; padding-bottom: 0.25rem; }
        .conspect-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; color: #334155; }
        .conspect-content li { margin-bottom: 0.5rem; }
        .conspect-content strong { color: #1e293b; background-color: #f1f5f9; padding: 0 4px; border-radius: 4px; }
        .conspect-content p { margin-bottom: 1rem; color: #334155; line-height: 1.6; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="bg-white shadow-sm border-b border-slate-200 py-4 px-6 flex justify-between items-center mb-8">
        <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2 cursor-pointer" onclick="window.location.href='/'">
            <span>🎓</span> SmartStudy
        </h1>
        <button onclick="window.history.back()" class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition">
            ← Назад до результатів
        </button>
    </header>

    <main class="max-w-4xl mx-auto px-4 pb-12">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <h1 class="text-3xl font-bold text-slate-800 mb-6 flex items-center gap-3">
                <span>📚</span> Розумний конспект
            </h1>
            
            <div class="conspect-content">
                {{ conspect | safe }}
            </div>
        </div>
    </main>
</body>
</html>
