<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Помилка {{ status_code }} - SmartStudy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white max-w-md w-full p-8 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-200 text-center relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-1.5 bg-red-500"></div>
        
        <div class="text-6xl mb-6">⚠️</div>
        
        <h1 class="text-2xl font-extrabold text-slate-800 mb-3">
            Упс... Помилка {{ status_code }}
        </h1>
        
        <p class="text-slate-600 mb-8 bg-red-50 p-4 rounded-xl border border-red-100 text-sm">
            {{ message }}
        </p>
        
        <button onclick="window.location.href='/'" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3.5 px-4 rounded-xl transition duration-200 flex justify-center items-center gap-2 active:scale-[0.98]">
            <span>←</span> Спробувати інше відео
        </button>

    </div>

</body>
</html>
